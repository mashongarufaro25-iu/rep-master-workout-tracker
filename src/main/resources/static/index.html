<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale1.0">
    <title>RepMaster</title>
    <!-- Link to our stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


<!-- Main Login Card-->
<div class="container">

    <!--  Header  -->
    <header>

        <h1>RepMaster</h1>

        <p>Your Personal Workout Tracker</p>

    </header>

    <!--  Login Form  -->
    <main>

        <form id="loginForm">

            <!-- Username -->
            <label for="username">Username</label>

            <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    required>

            <!-- Password -->
            <label for="password">Password</label>

            <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>

            <!-- Login Button -->
            <button type="submit" id="loginButton">

                Login

            </button>

        </form>

    </main>

    <!-- Footer  -->
    <footer>

        <p>

            Don't have an account?

            <a href="register.html" id="registerLink">

                Register

            </a>

        </p>

    </footer>

</div>

<!-- JavaScript -->
<script src="js/app.js"></script>

</body>
</html>
